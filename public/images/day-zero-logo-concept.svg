<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <filter id="ring-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="5" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark purple background — remove this rect for a transparent version -->
  <rect width="500" height="500" fill="#1D0B38"/>

  <!--
    "0" RING — elliptical, three equal 120° segments
    Outer ellipse: Rx=90  Ry=122   Centre: (250, 188)
    Inner ellipse: Rx=52  Ry=74
    Ring thickness: ~38px horizontal, ~48px vertical

    SVG angle convention: 0°=right, clockwise
    Segment boundaries (exact touching, no gap):
      WHITE  210° → 330°   (10 o'clock → 12 o'clock → 2 o'clock)  top arc
      MINT   330° → 90°    (2 o'clock  → 3 o'clock  → 6 o'clock)  right side
      VIOLET  90° → 210°   (6 o'clock  → 9 o'clock  → 10 o'clock) left side

    Boundary co-ords (outer / inner):
      @ 210°  outer (172.1, 127.0)  inner (205.0, 151.0)
      @ 330°  outer (327.9, 127.0)  inner (295.0, 151.0)
      @  90°  outer (250.0, 310.0)  inner (250.0, 262.0)
  -->

  <g filter="url(#ring-shadow)">

    <!-- White segment — top -->
    <path d="M 172.1 127.0
             A 90 122 0 0 1 327.9 127.0
             L 295.0 151.0
             A 52 74  0 0 0 205.0 151.0
             Z"
          fill="#FFFFFF"/>

    <!-- Mint segment — right side -->
    <path d="M 327.9 127.0
             A 90 122 0 0 1 250.0 310.0
             L 250.0 262.0
             A 52 74  0 0 0 295.0 151.0
             Z"
          fill="#10B981"/>

    <!-- Violet segment — left side -->
    <path d="M 250.0 310.0
             A 90 122 0 0 1 172.1 127.0
             L 205.0 151.0
             A 52 74  0 0 0 250.0 262.0
             Z"
          fill="#7C3AED"/>

  </g>

  <!-- Segment dividing lines (background colour creates the visible gaps) -->
  <g stroke="#1D0B38" stroke-width="2.5" stroke-linecap="round">
    <line x1="172.1" y1="127.0" x2="205.0" y2="151.0"/>  <!-- white / violet -->
    <line x1="327.9" y1="127.0" x2="295.0" y2="151.0"/>  <!-- white / mint  -->
    <line x1="250.0" y1="310.0" x2="250.0" y2="262.0"/>  <!-- mint  / violet -->
  </g>

  <!-- Wordmark -->
  <text x="250" y="392"
        text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="700"
        font-size="44"
        fill="#FFFFFF"
        letter-spacing="8">DAY ZERO</text>

</svg>
